name: Deploy to Vercel (prerendered)

on:
  push:
    branches: [main]
  workflow_dispatch:

# Avoid overlapping production deploys for the same ref.
concurrency:
  group: vercel-prod-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    # The Vercel CLI reads these from the environment so we don't have to
    # commit `.vercel/project.json` or pass extra flags.
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium (with OS deps)
        run: npx playwright install --with-deps chromium

      - name: Build site (vite build + prerender)
        run: npm run build

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel project settings (production)
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      # Package the prerendered dist/ directly into the Build Output API
      # format instead of running `vercel build` (which would re-run vite
      # and overwrite the prerendered HTML).
      - name: Package prebuilt output for Vercel
        run: |
          mkdir -p .vercel/output
          cp -r dist .vercel/output/static
          cat > .vercel/output/config.json << 'JSON'
          {
            "version": 3,
            "routes": [
              { "handle": "filesystem" },
              { "src": "^(?:/((?!assets/).*))$", "dest": "/index.html", "check": true },
              { "handle": "error" },
              { "status": 404, "src": "^(?!/api).*$", "dest": "/404.html" }
            ]
          }
          JSON

      - name: Deploy prebuilt artifact to Vercel (production)
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
